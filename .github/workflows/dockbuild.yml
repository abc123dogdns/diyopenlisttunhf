name: Build and Publish OpenList + ABC Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制 Actions 使用 Node.js 24

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取仓库
      - name: Checkout repository
        uses: actions/checkout@v4  # 升级到 v4 支持 Node.js 24

      # 2️⃣ 安装 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.4.0  # 最新稳定版本

      # 3️⃣ 构建 Docker 镜像 (Linux AMD64)
      - name: Build Docker image
        run: |
          docker build \
            --platform=linux/amd64 \
            -t openlist-abc:latest .

      # 4️⃣ 导出 Docker 镜像为 tar 文件
      - name: Save Docker image as tar
        run: |
          mkdir -p image
          docker save openlist-abc:latest -o image/openlist-abc.tar

      # 5️⃣ 上传 tar 文件到 GitHub Artifact (v4)
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist-abc-image
          path: image/openlist-abc.tar

      # 6️⃣ 可选：测试运行镜像
      - name: Test container
        run: |
          docker run --rm -d --name test_openlist \
            -p 5244:5244 \
            openlist-abc:latest
          echo "Waiting 10s for OpenList + ABC to start..."
          sleep 10
          docker ps
