name: Build and Publish OpenList + ABC Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ 构建 Docker 镜像 (Linux AMD64)
      - name: Build Docker image
        run: |
          docker build \
            --platform=linux/amd64 \
            -t openlist-abc:latest .

      # 4️⃣ 导出 Docker 镜像为 tar 文件
      - name: Save Docker image as tar
        run: |
          mkdir -p image
          docker save openlist-abc:latest -o image/openlist-abc.tar

      # 5️⃣ 上传 tar 文件到 GitHub Artifact
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v3
        with:
          name: openlist-abc-image
          path: image/openlist-abc.tar
